CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y

CONFIG_LOG=y

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_PCIE=y
CONFIG_PCIE_CONTROLLER=y
# === 网络核心配置 ===
CONFIG_ETH_E1000=y

# === 关键：开启原始套接字 (SOEM 必须！) ===
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_PACKET=y

CONFIG_SHELL=y
CONFIG_NET_SHELL=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_LOG=y
CONFIG_NET_PKT_LOG_LEVEL_DBG=n
# CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=n
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.1.10"
# CONFIG_NET_CONFIG_IPV4_SUBNET_MASK="255.255.255.0"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.1.100"  # 假装发给电脑

CONFIG_NET_PKT_RX_COUNT=5120
CONFIG_NET_PKT_TX_COUNT=5120
CONFIG_NET_BUF_RX_COUNT=20480
CONFIG_NET_BUF_TX_COUNT=20480
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

CONFIG_POSIX_API=y

